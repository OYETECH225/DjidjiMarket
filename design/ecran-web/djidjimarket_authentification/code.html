<script>
        function switchTab(role) {
            const clientTab = document.getElementById('tab-client');
            const vendeurTab = document.getElementById('tab-vendeur');
            
            if (role === 'client') {
                clientTab.classList.add('bg-surface-container-lowest', 'text-primary', 'border', 'border-outline-variant');
                clientTab.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                vendeurTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'border', 'border-outline-variant');
                vendeurTab.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/50');
            } else {
                vendeurTab.classList.add('bg-surface-container-lowest', 'text-primary', 'border', 'border-outline-variant');
                vendeurTab.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/50');
                
                clientTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'border', 'border-outline-variant');
                clientTab.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/50');
            }
        }

        // Auto-focus logic for OTP
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });
    </script>

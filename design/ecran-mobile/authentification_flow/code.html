<!-- Micro-interactions Script -->
<script>
        function navigateTo(screenId) {
            const screens = ['screen-welcome', 'screen-login', 'screen-otp'];
            
            // On desktop we keep side-by-side if they fit, 
            // but on mobile we focus the current one
            if (window.innerWidth < 768) {
                screens.forEach(id => {
                    const el = document.getElementById(id);
                    if (id === screenId) {
                        el.classList.remove('hidden');
                        el.classList.add('flex');
                    } else {
                        el.classList.add('hidden');
                        el.classList.remove('flex');
                    }
                });
            } else {
                // Highlights the active screen subtly on desktop
                screens.forEach(id => {
                    const el = document.getElementById(id);
                    if (id === screenId) {
                        el.style.transform = 'scale(1.02)';
                        el.style.borderColor = '#053715';
                        el.style.opacity = '1';
                    } else {
                        el.style.transform = 'scale(0.98)';
                        el.style.borderColor = '#c1c9be';
                        el.style.opacity = '0.7';
                    }
                });
            }
        }

        // Initialize state
        window.addEventListener('load', () => {
            if (window.innerWidth < 768) {
                navigateTo('screen-welcome');
            } else {
                navigateTo('screen-welcome');
            }
        });

        // OTP inputs auto-focus logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Countdown Timer
        let time = 45;
        const timerEl = document.querySelector('#timer span');
        const countdown = setInterval(() => {
            if (time <= 0) {
                document.getElementById('timer').innerHTML = '<span class="text-primary font-semibold cursor-pointer">Renvoyer le code maintenant</span>';
                clearInterval(countdown);
                return;
            }
            time--;
            const mins = Math.floor(time / 60);
            const secs = time % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>

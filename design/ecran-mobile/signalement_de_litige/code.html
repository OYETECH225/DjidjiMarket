<style>
    body {

  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-container-margin h-16 transition-colors duration-200">
<div class="flex items-center gap-md">
<button class="hover:bg-surface-variant/50 transition-colors duration-200 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-on-surface">Signaler un problème</h1>
</div>
<div class="flex items-center gap-xs">
<button class="hover:bg-surface-variant/50 transition-colors duration-200 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="px-container-margin mt-lg max-w-2xl mx-auto">
<!-- Order Context -->
<section class="mb-xl flex items-center justify-between p-md bg-surface-container-low border border-outline-variant rounded-lg">
<div>
<p class="font-label-sm text-on-surface-variant">Commande n°</p>
<p class="font-headline-md text-headline-md-mobile text-primary">DJ-8842-XPV</p>
</div>
<div class="w-12 h-12 bg-surface-container rounded-md flex items-center justify-center overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A macro shot of a vibrant local West African textile featuring intricate geometric patterns in green and gold, lit with soft natural afternoon sunlight to highlight the quality of the weave. The style is modern product photography with a clean, light-mode background and high-key illumination." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYz86M3CnUPKQvKMKkKzIjadpF6Yz6kO5szjjQ7QxwC05uiPPLUV-FpQ2Wihs0y4W-7PpyKhIA23IFQlCrgxdez3ZukiTnSZ0U3TPrfSZ8mjE6PnIBkzJKNzukmWiKmr_zeGhBHqdYnlOLsSJaIYGVCd13zhKqoECEtKBiE84IlytXvasbAfoi1ljIPOwlwzX0VCZ7oR2DslrTWsRqGUoHnZvoqk3QzLmp9DvDv62lI-l127sXvywI"/>
</div>
</section>
<!-- Reason Selection -->
<section class="mb-xl">
<h2 class="font-label-md text-label-md text-on-surface mb-md">Quel est le motif du litige ?</h2>
<div class="flex flex-wrap gap-sm" id="reason-chips">
<button class="px-md py-xs rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors duration-200 active:scale-95 font-label-md text-label-md" onclick="selectChip(this)">Article manquant</button>
<button class="px-md py-xs rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors duration-200 active:scale-95 font-label-md text-label-md" onclick="selectChip(this)">Article endommagé</button>
<button class="px-md py-xs rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors duration-200 active:scale-95 font-label-md text-label-md" onclick="selectChip(this)">Non conforme</button>
<button class="px-md py-xs rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors duration-200 active:scale-95 font-label-md text-label-md" onclick="selectChip(this)">Contrefaçon</button>
<button class="px-md py-xs rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-colors duration-200 active:scale-95 font-label-md text-label-md" onclick="selectChip(this)">Autre</button>
</div>
</section>
<!-- Description -->
<section class="mb-xl">
<h2 class="font-label-md text-label-md text-on-surface mb-md">Décrivez le problème</h2>
<div class="relative">
<textarea class="w-full min-h-[160px] p-md rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-0 transition-colors duration-200 font-body-md text-body-md text-on-surface resize-none" placeholder="Détaillez ce qui s'est passé avec votre commande..."></textarea>
</div>
</section>
<!-- Photo Upload -->
<section class="mb-xl">
<h2 class="font-label-md text-label-md text-on-surface mb-md">Ajouter des photos (Optionnel)</h2>
<div class="grid grid-cols-3 gap-gutter">
<button class="aspect-square flex flex-col items-center justify-center rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-colors duration-200 group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors duration-200 text-3xl" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-sm text-outline mt-xs">Ajouter</span>
</button>
<div class="aspect-square rounded-lg border border-outline-variant overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="A close-up photograph of a damaged shipping box showing a small tear on the corner, resting on a clean white floor. The lighting is bright and professional, emphasizing a modern aesthetic of accountability and trust. The overall style is clean and minimal, consistent with a high-end marketplace interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPRdixgcixe32LRh05rblAHZ7THjqNGuylM48zYi1CP-KlTOVbzZ_vXnNsWYIjqEIpByGInSaSujFisCQcheNYi5fXrBOmK6ClACx0kQG31OnFB6src6MxXQzdV3wHDc7xTUIPAHgT9DsKffOxz0OmoC3gOEVOnvibx_HDKX8gWxumBQ180lYAO37u5Qw30MM92XCqLEHtWUzlWNoNqYiP1c9Vk9jAkZa6YbA69BXmPsa5mdPbgXHb"/>
<button class="absolute top-1 right-1 bg-error text-on-error rounded-full p-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
</div>
</div>
</section>
<!-- Trust Banner -->
<section class="mb-xxl p-md bg-primary/5 rounded-lg flex items-start gap-md border border-primary/10">
<span class="material-symbols-outlined text-primary mt-1" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<div>
<h3 class="font-label-md text-label-md text-primary mb-1">Votre paiement reste protégé</h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-tight">DjidjiMarket retient les fonds jusqu'à ce que le litige soit résolu de manière équitable. Nous sommes à vos côtés.</p>
</div>
</section>
<!-- Action Button -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-background/80 backdrop-blur-sm">
<button class="w-full py-md rounded-full bg-secondary text-on-secondary font-headline-md transition-all duration-300 active:scale-[0.98] shadow-none hover:bg-secondary/90 max-w-2xl mx-auto flex justify-center items-center gap-sm">
<span>Envoyer le signalement</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</main>
<script>
        function selectChip(element) {
            const container = document.getElementById('reason-chips');
            const chips = container.getElementsByTagName('button');
            
            for (let chip of chips) {
                chip.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                chip.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
            }
            
            element.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
            element.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            
            // Micro-interaction
            element.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(0.95)' },
                { transform: 'scale(1)' }
            ], {
                duration: 200,
                easing: 'ease-in-out'
            });
        }

        // Initialize first chip as active
        window.addEventListener('load', () => {
            const firstChip = document.getElementById('reason-chips').querySelector('button');
            if(firstChip) selectChip(firstChip);
        });

        // Simple form interaction
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('focus', () => {
            textarea.parentElement.animate([
                { transform: 'translateY(0)' },
                { transform: 'translateY(-2px)' }
            ], {
                duration: 150,
                fill: 'forwards'
            });
        });
        textarea.addEventListener('blur', () => {
            textarea.parentElement.animate([
                { transform: 'translateY(-2px)' },
                { transform: 'translateY(0)' }
            ], {
                duration: 150,
                fill: 'forwards'
            });
        });
    </script>
</body></html>
